<!doctype html>
<html lang="es">
  <head>
    <script src='/route-guard.js'></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PUFAB - Trámites | Evaluaciones</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="portal-page">
    <header class="gov-header">
      <div class="container gov-header-inner">
        <img src="https://www.figma.com/api/mcp/asset/55d910c5-1bcc-479c-acd9-c78a28860e9b" alt="GOV.CO" class="gov-logo" />
        <nav class="gov-links"><a href="https://www.gov.co/" target="_blank" rel="noreferrer">GOV.CO</a><a href="#">Ministerio de Cultura</a><a href="#">Proimágenes</a></nav>
      </div>
      <div class="flag-strip"></div>
    </header>

    <nav class="site-nav">
      <div class="container site-nav-inner">
        <a href="/" class="brand"><span class="brand-icon">◧</span><span>PUFAB</span></a>
        <button class="menu-toggle" aria-label="Abrir menú" id="menuToggle">☰</button>
        <div class="nav-links" id="navLinks">
          <a href="/">Inicio</a>
          <a href="/directorio/">Directorio</a>
          <a href="/tramites/" class="active">Trámites</a>
          <a href="/contacto/">Contacto</a>
        </div>
        <div class="portal-user">Juan Pérez García</div>
      </div>
    </nav>

    <main class="portal-shell container">
      <aside class="portal-sidebar">
        <h2>Ventanilla Única</h2>
        <a class="portal-link" href="/tramites/">Mi panel</a>
        <a class="portal-link" href="/tramites/productor-2.html">Mis Permisos</a>
        <a class="portal-link" href="/tramites/productor-3.html">Catálogo de Locaciones</a>
        <a class="portal-link" href="/tramites/productor-4.html">Directorio de Proveedores</a>
        <a class="portal-link active" href="/tramites/productor-5.html">Evaluaciones</a>
      </aside>

      <section class="portal-content">
        <div class="portal-breadcrumb">Ventanilla Única > Evaluaciones</div>
        <h1>Evaluaciones y Observaciones</h1>

        <article class="portal-card" id="evaluacionCard">Cargando evaluación...</article>
      </section>
    </main>

    <script>
      const menuToggle = document.getElementById('menuToggle');
      const navLinks = document.getElementById('navLinks');
      const evaluacionCard = document.getElementById('evaluacionCard');
      menuToggle?.addEventListener('click', () => navLinks?.classList.toggle('open'));

      async function cargarEvaluacion() {
        const response = await fetch('/api/v1/portal/productor/evaluaciones');
        const payload = await response.json();
        const data = payload?.datos || payload;
        evaluacionCard.innerHTML = `
          <div class="permit-top">
            <div>
              <small>${data.codigo} · ${data.permiso}</small>
              <h3>${data.proyecto}</h3>
              <p>${data.comite}</p>
            </div>
            <span class="status-badge warning">Responder antes de ${data.fecha_limite}</span>
          </div>
          <div class="portal-grid-2">
            <div class="alert-list">
              <strong>Observaciones del Comité</strong>
              ${data.observaciones.map((item) => `<span>${item}</span>`).join('')}
            </div>
            <div class="portal-card">
              <h3>Documentos Requeridos</h3>
              ${(data.documentos_requeridos || []).map((doc) => `<div class="permit-actions"><a href="#">${doc}</a><a href="#">Subir</a></div>`).join('')}
            </div>
          </div>
          <a class="btn btn-primary full" href="#">Enviar Respuesta al Comité</a>
        `;
      }

      cargarEvaluacion();
    </script>
    <script src='/nav-session.js'></script>
    <script src='/sidebar-slider.js'></script>
  </body>
</html>
