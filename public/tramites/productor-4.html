<!doctype html>
<!--
  Descripción: Página HTML del frontend del proyecto.
-->

<html lang="es">
  <head>
    <script src='/route-guard.js'></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PUFAB - Trámites | Directorio de Proveedores</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="portal-page">
    <header class="gov-header">
      <div class="container gov-header-inner">
        <img src="https://www.figma.com/api/mcp/asset/55d910c5-1bcc-479c-acd9-c78a28860e9b" alt="GOV.CO" class="gov-logo" />
        <nav class="gov-links"><a href="https://www.gov.co/" target="_blank" rel="noreferrer">GOV.CO</a><a href="#">Ministerio de Cultura</a><a href="#">Proimágenes</a></nav>
      </div>
      <div class="flag-strip"></div>
    </header>

    <nav class="site-nav">
      <div class="container site-nav-inner">
        <a href="/" class="brand"><span class="brand-icon">◧</span><span>PUFAB</span></a>
        <button class="menu-toggle" aria-label="Abrir menú" id="menuToggle">☰</button>
        <div class="nav-links" id="navLinks">
          <a href="/">Inicio</a>
          <a href="/directorio/">Directorio</a>
          <a href="/tramites/" class="active">Trámites</a>
          <a href="/contacto/">Contacto</a>
        </div>
        <div class="portal-user">Juan Pérez García</div>
      </div>
    </nav>

    <main class="portal-shell container">
      <aside class="portal-sidebar">
        <h2>Ventanilla Única</h2>
        <a class="portal-link" href="/tramites/">Mi panel</a>
        <a class="portal-link" href="/tramites/productor-2.html">Mis Permisos</a>
        <a class="portal-link" href="/tramites/productor-3.html">Catálogo de Locaciones</a>
        <a class="portal-link active" href="/tramites/productor-4.html">Directorio de Proveedores</a>
        <a class="portal-link" href="/tramites/productor-5.html">Evaluaciones</a>
      </aside>

      <section class="portal-content">
        <div class="portal-breadcrumb">Ventanilla Única > Directorio de Proveedores</div>
        <h1>Directorio de Proveedores</h1>

        <div class="catalog-toolbar">
          <input type="search" id="buscarProveedor" placeholder="Buscar proveedor..." />
          <select id="filtroSubcategoria"><option value="">Todas las categorías</option></select>
          <div class="portal-counter" id="totalProveedores">0 resultados</div>
        </div>

        <div class="providers-grid" id="providersGrid"></div>
      </section>
    </main>

    <script>
      const menuToggle = document.getElementById('menuToggle');
      const navLinks = document.getElementById('navLinks');
      const providersGrid = document.getElementById('providersGrid');
      const buscarProveedor = document.getElementById('buscarProveedor');
      const filtroSubcategoria = document.getElementById('filtroSubcategoria');
      const totalProveedores = document.getElementById('totalProveedores');
      let allProviders = [];

      menuToggle?.addEventListener('click', () => navLinks?.classList.toggle('open'));

      function getData(payload) {
        return payload?.datos ?? payload?.data ?? payload;
      }

      function buildContactLinks(item) {
        const email = item?.usuario?.email || item?.contacto?.email || '';
        const phone = item?.usuario?.telefono || item?.contacto?.telefono || '';
        const providerName = item?.usuario?.email ? item.usuario.email.split('@')[0].replaceAll('.', ' ') : `Proveedor ${item.id}`;
        const subject = encodeURIComponent(`PUFAB: contacto con ${providerName}`);
        const body = encodeURIComponent(`Hola ${providerName}, quisiera obtener más información sobre sus servicios publicados en el directorio de PUFAB.`);

        const emailHref = email ? `mailto:${email}?subject=${subject}&body=${body}` : '/contacto/';
        const whatsappHref = phone ? `https://wa.me/${String(phone).replace(/\D/g, '')}?text=${body}` : emailHref;

        return { emailHref, whatsappHref };
      }

      function renderProviders(items) {
        totalProveedores.textContent = `${items.length} resultados`;
        if (!items.length) {
          providersGrid.innerHTML = '<article class="portal-card">No hay proveedores para este filtro.</article>';
          return;
        }

        providersGrid.innerHTML = items
          .map((item) => {
            const name = item?.usuario?.email ? item.usuario.email.split('@')[0].replaceAll('.', ' ') : `Proveedor ${item.id}`;
            const subcats = (item?.subcategorias || []).map((s) => s.nombre).slice(0, 3);
            const especialidades = (item?.especialidades || []).map((e) => e.nombre).slice(0, 3);
            const { emailHref, whatsappHref } = buildContactLinks(item);
            return `
              <article class="provider-card">
                <div>
                  <h3>${name}</h3>
                  <small>${item?.descripcion_perfil || 'Proveedor audiovisual verificado'}</small>
                  <div class="provider-tags">${subcats.map((t) => `<span>${t}</span>`).join('')}${especialidades.map((t) => `<span>${t}</span>`).join('')}</div>
                </div>
                <div style="display:flex; gap: 0.75rem; flex-wrap: wrap; justify-content:flex-end;">
                  <a class="btn btn-primary" href="${emailHref}">Contactar</a>
                  <a class="btn btn-light" href="${whatsappHref}" target="_blank" rel="noreferrer">WhatsApp</a>
                </div>
              </article>
            `;
          })
          .join('');
      }

      function applyFilters() {
        const query = buscarProveedor.value.trim().toLowerCase();
        const subcat = filtroSubcategoria.value;
        const filtered = allProviders.filter((item) => {
          const matchText = !query || [
            item?.descripcion_perfil,
            item?.usuario?.email,
            ...(item?.subcategorias || []).map((s) => s?.nombre),
            ...(item?.especialidades || []).map((s) => s?.nombre),
          ].filter(Boolean).join(' ').toLowerCase().includes(query);

          const matchSub = !subcat || (item?.subcategorias || []).some((s) => String(s.id) === String(subcat));
          return matchText && matchSub;
        });
        renderProviders(filtered);
      }

      async function bootstrap() {
        const categoriesResponse = await fetch('/api/v1/perfiles/categorias');
        const categoriesPayload = await categoriesResponse.json();
        const categories = Array.isArray(getData(categoriesPayload)) ? getData(categoriesPayload) : [];
        const options = ['<option value="">Todas las categorías</option>'];
        categories.forEach((cat) => {
          (cat.subcategorias || []).forEach((sub) => {
            options.push(`<option value="${sub.id}">${cat.nombre} · ${sub.nombre}</option>`);
          });
        });
        filtroSubcategoria.innerHTML = options.join('');

        const directoryResponse = await fetch('/api/v1/perfiles/proveedores/directorio?limit=50&page=1');
        const directoryPayload = await directoryResponse.json();
        const directoryData = getData(directoryPayload);
        allProviders = Array.isArray(directoryData?.data) ? directoryData.data : [];
        applyFilters();
      }

      buscarProveedor?.addEventListener('input', applyFilters);
      filtroSubcategoria?.addEventListener('change', applyFilters);

      bootstrap();
    </script>
    <script src='/nav-session.js'></script>
    <script src='/sidebar-slider.js'></script>
  </body>
</html>
