<!doctype html>
<html lang="es">
  <head>
    <script src='/route-guard.js'></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PUFAB - Trámites | Catálogo de Locaciones</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="portal-page">
    <header class="gov-header">
      <div class="container gov-header-inner">
        <img src="https://www.figma.com/api/mcp/asset/55d910c5-1bcc-479c-acd9-c78a28860e9b" alt="GOV.CO" class="gov-logo" />
        <nav class="gov-links"><a href="https://www.gov.co/" target="_blank" rel="noreferrer">GOV.CO</a><a href="#">Ministerio de Cultura</a><a href="#">Proimágenes</a></nav>
      </div>
      <div class="flag-strip"></div>
    </header>

    <nav class="site-nav">
      <div class="container site-nav-inner">
        <a href="/" class="brand"><span class="brand-icon">◧</span><span>PUFAB</span></a>
        <button class="menu-toggle" aria-label="Abrir menú" id="menuToggle">☰</button>
        <div class="nav-links" id="navLinks">
          <a href="/">Inicio</a>
          <a href="/directorio/">Directorio</a>
          <a href="/tramites/" class="active">Trámites</a>
          <a href="/contacto/">Contacto</a>
        </div>
        <div class="portal-user">Juan Pérez García</div>
      </div>
    </nav>

    <main class="portal-shell container">
      <aside class="portal-sidebar">
        <h2>Ventanilla Única</h2>
        <a class="portal-link" href="/tramites/">Mi panel</a>
        <a class="portal-link" href="/tramites/productor-2.html">Mis Permisos</a>
        <a class="portal-link active" href="/tramites/productor-3.html">Catálogo de Locaciones</a>
        <a class="portal-link" href="/tramites/productor-4.html">Directorio de Proveedores</a>
        <a class="portal-link" href="/tramites/productor-5.html">Evaluaciones</a>
        <a class="portal-link" href="/directorio/">Directorio de Proveedores</a>
      </aside>

      <section class="portal-content">
        <div class="portal-breadcrumb">Ventanilla Única > Catálogo de Locaciones</div>
        <h1>Catálogo de Locaciones</h1>

        <div class="catalog-toolbar">
          <input type="search" id="buscarLocacion" placeholder="Buscar locación..." />
          <select id="filtroTipo">
            <option value="todos">Todos los tipos</option>
            <option value="urbano">Urbano</option>
            <option value="natural">Natural</option>
            <option value="paramo">Páramo</option>
            <option value="historico">Histórico</option>
            <option value="patrimonial">Patrimonial</option>
            <option value="geologico">Geológico</option>
          </select>
          <select id="filtroProvincia">
            <option value="todas">Todas las provincias</option>
            <option value="Centro">Centro</option>
            <option value="Sugamuxi">Sugamuxi</option>
            <option value="Occidente">Occidente</option>
          </select>
        </div>

        <div class="catalog-grid" id="catalogGrid"></div>
      </section>
    </main>

    <script>
      const menuToggle = document.getElementById('menuToggle');
      const navLinks = document.getElementById('navLinks');
      const catalogGrid = document.getElementById('catalogGrid');
      const buscarLocacion = document.getElementById('buscarLocacion');
      const filtroTipo = document.getElementById('filtroTipo');
      const filtroProvincia = document.getElementById('filtroProvincia');

      menuToggle?.addEventListener('click', () => navLinks?.classList.toggle('open'));

      function moneda(value) {
        return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(value);
      }

      function renderLocaciones(items) {
        if (!items.length) {
          catalogGrid.innerHTML = '<article class="portal-card">No hay locaciones para este filtro.</article>';
          return;
        }

        catalogGrid.innerHTML = items
          .map(
            (item) => `
              <article class="catalog-card">
                <img src="${item.imagen}" alt="${item.nombre}" />
                <div>
                  <small>${item.tipo} · ${item.provincia}</small>
                  <h3>${item.nombre}</h3>
                  <p>${moneda(item.precio)} día</p>
                  <a href="#">Reservar</a>
                </div>
              </article>
            `,
          )
          .join('');
      }

      async function cargarLocaciones() {
        const params = new URLSearchParams({
          buscar: buscarLocacion.value.trim(),
          tipo: filtroTipo.value,
          provincia: filtroProvincia.value,
        });
        const response = await fetch(`/api/v1/portal/productor/locaciones?${params.toString()}`);
        const payload = await response.json();
        const data = payload?.datos?.data || payload?.data || [];
        renderLocaciones(data);
      }

      buscarLocacion?.addEventListener('input', cargarLocaciones);
      filtroTipo?.addEventListener('change', cargarLocaciones);
      filtroProvincia?.addEventListener('change', cargarLocaciones);

      cargarLocaciones();
    </script>
    <script src='/nav-session.js'></script>
    <script src='/sidebar-slider.js'></script>
  </body>
</html>
