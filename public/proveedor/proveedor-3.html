<!doctype html>
<html lang="es">
  <head>
    <script src='/route-guard.js'></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PUFAB - Proveedor | Disponibilidad</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="portal-page">
    <header class="gov-header">
      <div class="container gov-header-inner">
        <img src="https://www.figma.com/api/mcp/asset/55d910c5-1bcc-479c-acd9-c78a28860e9b" alt="GOV.CO" class="gov-logo" />
        <nav class="gov-links"><a href="https://www.gov.co/" target="_blank" rel="noreferrer">GOV.CO</a><a href="#">Ministerio de Cultura</a><a href="#">Proimágenes</a></nav>
      </div>
      <div class="flag-strip"></div>
    </header>

    <nav class="site-nav">
      <div class="container site-nav-inner">
        <a href="/" class="brand"><span class="brand-icon">◧</span><span>PUFAB</span></a>
        <button class="menu-toggle" aria-label="Abrir menú" id="menuToggle">☰</button>
        <div class="nav-links" id="navLinks">
          <a href="/">Inicio</a>
          <a href="/directorio/">Directorio</a>
          <a href="/tramites/">Trámites</a>
          <a href="/contacto/">Contacto</a>
          <a href="/proveedor/" class="active">Proveedor</a>
        </div>
        <div class="portal-user">Proveedor</div>
      </div>
    </nav>

    <main class="portal-shell container">
      <aside class="portal-sidebar">
        <h2>Mi Perfil Profesional</h2>
        <a class="portal-link" href="/proveedor/">Mi Panel</a>
        <a class="portal-link" href="/proveedor/proveedor-2.html">Portafolio</a>
        <a class="portal-link active" href="/proveedor/proveedor-3.html">Disponibilidad</a>
        <a class="portal-link" href="/proveedor/proveedor-4.html">Solicitudes</a>
        <a class="portal-link" href="/proveedor/proveedor-5.html">Mensajes</a>
      </aside>

      <section class="portal-content" id="disponibilidadContent">Cargando agenda...</section>
    </main>

    <script>
      const menuToggle = document.getElementById('menuToggle');
      const navLinks = document.getElementById('navLinks');
      const disponibilidadContent = document.getElementById('disponibilidadContent');

      menuToggle?.addEventListener('click', () => navLinks?.classList.toggle('open'));

      async function init() {
        const response = await fetch('/api/v1/portal/proveedor/disponibilidad');
        const payload = await response.json();
        const data = payload?.datos || payload;

        disponibilidadContent.innerHTML = `
          <div class="portal-breadcrumb">Panel de Proveedor > Disponibilidad</div>
          <div class="provider-header">
            <div>
              <h1>Disponibilidad de ${data.nombre}</h1>
              <p>${data.ciudad}</p>
              <small>Gestiona tus horarios y bloqueos semanales para recibir nuevas solicitudes.</small>
            </div>
            <a class="btn btn-primary" href="#">Bloquear Fecha</a>
          </div>

          <section class="portal-card">
            <h3>Agenda Semanal</h3>
            <div class="provider-table">
              ${(data.semana || []).map((row) => `<div><strong>${row.dia}</strong><span>${row.estado}</span><small>${row.horas}</small></div>`).join('')}
            </div>
          </section>
        `;
      }

      init();
    </script>
    <script src='/nav-session.js'></script>
    <script src='/sidebar-slider.js'></script>
  </body>
</html>
