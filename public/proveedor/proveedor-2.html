<!doctype html>
<!--
  Descripción: Página HTML del frontend del proyecto.
-->

<html lang="es">
  <head>
    <script src='/route-guard.js'></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PUFAB - Proveedor | Portafolio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="portal-page">
    <header class="gov-header">
      <div class="container gov-header-inner">
        <img src="https://www.figma.com/api/mcp/asset/55d910c5-1bcc-479c-acd9-c78a28860e9b" alt="GOV.CO" class="gov-logo" />
        <nav class="gov-links"><a href="https://www.gov.co/" target="_blank" rel="noreferrer">GOV.CO</a><a href="#">Ministerio de Cultura</a><a href="#">Proimágenes</a></nav>
      </div>
      <div class="flag-strip"></div>
    </header>

    <nav class="site-nav">
      <div class="container site-nav-inner">
        <a href="/" class="brand"><span class="brand-icon">◧</span><span>PUFAB</span></a>
        <button class="menu-toggle" aria-label="Abrir menú" id="menuToggle">☰</button>
        <div class="nav-links" id="navLinks">
          <a href="/">Inicio</a>
          <a href="/directorio/">Directorio</a>
          <a href="/tramites/">Trámites</a>
          <a href="/contacto/">Contacto</a>
          <a href="/proveedor/" class="active">Proveedor</a>
        </div>
        <div class="portal-user">Proveedor</div>
      </div>
    </nav>

    <main class="portal-shell container">
      <aside class="portal-sidebar">
        <h2>Mi Perfil Profesional</h2>
        <a class="portal-link" href="/proveedor/">Mi Panel</a>
        <a class="portal-link active" href="/proveedor/proveedor-2.html">Portafolio</a>
        <a class="portal-link" href="/proveedor/proveedor-3.html">Disponibilidad</a>
        <a class="portal-link" href="/proveedor/proveedor-4.html">Solicitudes</a>
        <a class="portal-link" href="/proveedor/proveedor-5.html">Mensajes</a>
      </aside>

      <section class="portal-content" id="portafolioContent">Cargando portafolio...</section>
    </main>

    <script src="/api-client.js"></script>
    <script>
      const menuToggle = document.getElementById('menuToggle');
      const navLinks = document.getElementById('navLinks');
      const portafolioContent = document.getElementById('portafolioContent');

      menuToggle?.addEventListener('click', () => navLinks?.classList.toggle('open'));

      function money(value) {
        return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(value);
      }

      async function init() {
        try {
          const data = await API_CLIENT.portal.proveedor.portafolio();

          portafolioContent.innerHTML = `
            <div class="portal-breadcrumb">Panel de Proveedor > Portafolio</div>
            <div class="provider-header">
              <div>
                <h1>Portafolio de ${data.nombre}</h1>
                <p>${data.rol}</p>
                <small>${data.descripcion}</small>
              </div>
              <a class="btn btn-primary" href="/crear-proyecto/">Agregar Proyecto</a>
            </div>

            <section class="portal-card">
              <h3>Servicios Publicados</h3>
              <div class="services-list">${(data.servicios || []).map((s) => `<div><span>${s.nombre}</span><strong>${money(s.precio)}</strong></div>`).join('')}</div>
            </section>

            <section class="portal-card">
              <h3>Galería de Trabajos</h3>
              <div class="provider-gallery">${(data.galeria || []).map((item) => `<img src="${item.imagen}" alt="${item.titulo}" />`).join('')}</div>
            </section>
          `;
        } catch (error) {
          portafolioContent.innerHTML = `<article class="portal-card"><h1>No fue posible cargar el portafolio</h1><p>${error?.message || 'Intenta de nuevo más tarde.'}</p><a class="btn btn-primary" href="/crear-proyecto/">Crear proyecto</a></article>`;
        }
      }

      init();
    </script>
    <script src='/nav-session.js'></script>
    <script src='/sidebar-slider.js'></script>
  </body>
</html>
