<!doctype html>
<!--
  Descripción: Página HTML del frontend del proyecto.
-->

<html lang="es">
  <head>
    <script src='/route-guard.js'></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PUFAB - Proveedor | Solicitudes</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="portal-page">
    <header class="gov-header">
      <div class="container gov-header-inner">
        <img src="https://www.figma.com/api/mcp/asset/55d910c5-1bcc-479c-acd9-c78a28860e9b" alt="GOV.CO" class="gov-logo" />
        <nav class="gov-links"><a href="https://www.gov.co/" target="_blank" rel="noreferrer">GOV.CO</a><a href="#">Ministerio de Cultura</a><a href="#">Proimágenes</a></nav>
      </div>
      <div class="flag-strip"></div>
    </header>

    <nav class="site-nav">
      <div class="container site-nav-inner">
        <a href="/" class="brand"><span class="brand-icon">◧</span><span>PUFAB</span></a>
        <button class="menu-toggle" aria-label="Abrir menú" id="menuToggle">☰</button>
        <div class="nav-links" id="navLinks">
          <a href="/">Inicio</a>
          <a href="/directorio/">Directorio</a>
          <a href="/tramites/">Trámites</a>
          <a href="/contacto/">Contacto</a>
          <a href="/proveedor/" class="active">Proveedor</a>
        </div>
        <div class="portal-user">Proveedor</div>
      </div>
    </nav>

    <main class="portal-shell container">
      <aside class="portal-sidebar">
        <h2>Mi Perfil Profesional</h2>
        <a class="portal-link" href="/proveedor/">Mi Panel</a>
        <a class="portal-link" href="/proveedor/proveedor-2.html">Portafolio</a>
        <a class="portal-link" href="/proveedor/proveedor-3.html">Disponibilidad</a>
        <a class="portal-link active" href="/proveedor/proveedor-4.html">Solicitudes</a>
        <a class="portal-link" href="/proveedor/proveedor-5.html">Mensajes</a>
      </aside>

      <section class="portal-content" id="solicitudesContent">Cargando solicitudes...</section>
    </main>

    <script src="/api-client.js"></script>
    <script>
      const menuToggle = document.getElementById('menuToggle');
      const navLinks = document.getElementById('navLinks');
      const solicitudesContent = document.getElementById('solicitudesContent');
      let solicitudesActuales = [];

      menuToggle?.addEventListener('click', () => navLinks?.classList.toggle('open'));

      function money(value) {
        return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(value);
      }

      function exportarSolicitudesCsv() {
        if (!solicitudesActuales.length) return;
        const headers = ['codigo', 'estado', 'proyecto', 'cliente', 'fecha', 'dias', 'valor'];
        const rows = [headers.join(',')].concat(
          solicitudesActuales.map((item) => headers.map((key) => JSON.stringify(item[key] ?? '')).join(',')),
        );
        const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `solicitudes-proveedor-${new Date().toISOString().slice(0, 10)}.csv`;
        link.click();
        URL.revokeObjectURL(url);
      }

      async function init() {
        try {
          const data = await API_CLIENT.portal.proveedor.solicitudes();
          const solicitudes = data.solicitudes || [];
          solicitudesActuales = solicitudes;

          solicitudesContent.innerHTML = `
            <div class="portal-breadcrumb">Panel de Proveedor > Solicitudes</div>
            <div class="provider-header">
              <div>
                <h1>Solicitudes de Servicio</h1>
                <p>${solicitudes.length} solicitudes recientes</p>
                <small>Responde a tiempo para mejorar la visibilidad de tu perfil en el directorio.</small>
              </div>
              <button class="btn btn-primary" type="button" id="exportSolicitudesBtn">Exportar CSV</button>
            </div>

            <section class="portal-card">
              ${solicitudes.length
                ? solicitudes.map((r) => `<div class="portal-permit"><div><small>${r.codigo} · ${r.estado}</small><strong>${r.proyecto}</strong><span>${r.cliente} · ${r.fecha} · ${r.dias} días</span></div><strong>${money(r.valor)}</strong></div>`).join('')
                : '<p>No hay solicitudes registradas todavía.</p>'}
            </section>
          `;

          document.getElementById('exportSolicitudesBtn')?.addEventListener('click', exportarSolicitudesCsv);
        } catch (error) {
          solicitudesContent.innerHTML = `<article class="portal-card"><h1>No fue posible cargar las solicitudes</h1><p>${error?.message || 'Intenta de nuevo más tarde.'}</p></article>`;
        }
      }

      init();
    </script>
    <script src='/nav-session.js'></script>
    <script src='/sidebar-slider.js'></script>
  </body>
</html>
