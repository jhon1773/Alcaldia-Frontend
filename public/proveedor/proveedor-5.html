<!doctype html>
<!--
  Descripción: Página HTML del frontend del proyecto.
-->

<html lang="es">
  <head>
    <script src='/route-guard.js'></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PUFAB - Proveedor | Mensajes</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="portal-page">
    <header class="gov-header">
      <div class="container gov-header-inner">
        <img src="https://www.figma.com/api/mcp/asset/55d910c5-1bcc-479c-acd9-c78a28860e9b" alt="GOV.CO" class="gov-logo" />
        <nav class="gov-links"><a href="https://www.gov.co/" target="_blank" rel="noreferrer">GOV.CO</a><a href="#">Ministerio de Cultura</a><a href="#">Proimágenes</a></nav>
      </div>
      <div class="flag-strip"></div>
    </header>

    <nav class="site-nav">
      <div class="container site-nav-inner">
        <a href="/" class="brand"><span class="brand-icon">◧</span><span>PUFAB</span></a>
        <button class="menu-toggle" aria-label="Abrir menú" id="menuToggle">☰</button>
        <div class="nav-links" id="navLinks">
          <a href="/">Inicio</a>
          <a href="/directorio/">Directorio</a>
          <a href="/tramites/">Trámites</a>
          <a href="/contacto/">Contacto</a>
          <a href="/proveedor/" class="active">Proveedor</a>
        </div>
        <div class="portal-user">Proveedor</div>
      </div>
    </nav>

    <main class="portal-shell container">
      <aside class="portal-sidebar">
        <h2>Mi Perfil Profesional</h2>
        <a class="portal-link" href="/proveedor/">Mi Panel</a>
        <a class="portal-link" href="/proveedor/proveedor-2.html">Portafolio</a>
        <a class="portal-link" href="/proveedor/proveedor-3.html">Disponibilidad</a>
        <a class="portal-link" href="/proveedor/proveedor-4.html">Solicitudes</a>
        <a class="portal-link active" href="/proveedor/proveedor-5.html">Mensajes</a>
      </aside>

      <section class="portal-content" id="mensajesContent">Cargando mensajes...</section>
    </main>

    <script src="/api-client.js"></script>
    <script>
      const menuToggle = document.getElementById('menuToggle');
      const navLinks = document.getElementById('navLinks');
      const mensajesContent = document.getElementById('mensajesContent');
      let mensajesActuales = [];

      menuToggle?.addEventListener('click', () => navLinks?.classList.toggle('open'));

      function abrirNuevoMensaje() {
        const titulo = prompt('Título del mensaje', 'Consulta de disponibilidad');
        if (!titulo) return;
        const texto = prompt('Escribe el mensaje', 'Hola, quisiera coordinar un nuevo servicio.');
        if (!texto) return;

        API_CLIENT.portal.proveedor.enviarMensaje(titulo, texto)
          .then(() => init())
          .catch((error) => alert(error?.message || 'No fue posible enviar el mensaje.'));
      }

      async function init() {
        try {
          const data = await API_CLIENT.portal.proveedor.mensajes();
          const mensajes = data.mensajes || [];
          mensajesActuales = mensajes;

          mensajesContent.innerHTML = `
            <div class="portal-breadcrumb">Panel de Proveedor > Mensajes</div>
            <div class="provider-header">
              <div>
                <h1>Mensajes</h1>
                <p>${mensajes.length} conversaciones activas</p>
                <small>Gestiona la comunicación con productores desde una única bandeja.</small>
              </div>
              <button class="btn btn-primary" type="button" id="newMessageBtn">Nuevo Mensaje</button>
            </div>

            <section class="portal-card provider-messages">
              ${mensajes.length
                ? mensajes.map((m, index) => `<article><h3>${m.titulo}</h3><small>${m.fecha}</small><p>${m.texto}</p><a href="mailto:${index % 2 === 0 ? 'info@boyacafilm.gov.co' : 'contacto@boyacafilm.gov.co'}?subject=${encodeURIComponent(m.titulo)}">Responder</a></article>`).join('')
                : '<p>No hay mensajes por ahora.</p>'}
            </section>
          `;

          document.getElementById('newMessageBtn')?.addEventListener('click', abrirNuevoMensaje);
        } catch (error) {
          mensajesContent.innerHTML = `<article class="portal-card"><h1>No fue posible cargar los mensajes</h1><p>${error?.message || 'Intenta de nuevo más tarde.'}</p></article>`;
        }
      }

      init();
    </script>
    <script src='/nav-session.js'></script>
    <script src='/sidebar-slider.js'></script>
  </body>
</html>
