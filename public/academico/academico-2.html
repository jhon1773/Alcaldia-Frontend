<!doctype html>
<!--
  Descripción: Página HTML del frontend del proyecto.
-->

<html lang="es">
  <head>
    <script src='/route-guard.js'></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PUFAB - Portal Académico | Observatorio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="portal-page academico-page">
    <header class="gov-header"><div class="container gov-header-inner"><img src="https://www.figma.com/api/mcp/asset/55d910c5-1bcc-479c-acd9-c78a28860e9b" alt="GOV.CO" class="gov-logo" /><nav class="gov-links"><a href="https://www.gov.co/" target="_blank" rel="noreferrer">GOV.CO</a><a href="#">Ministerio de Cultura</a><a href="#">Proimágenes</a></nav></div><div class="flag-strip"></div></header>
    <nav class="site-nav"><div class="container site-nav-inner"><a href="/" class="brand"><span class="brand-icon">◧</span><span>PUFAB</span></a><button class="menu-toggle" aria-label="Abrir menú" id="menuToggle">☰</button><div class="nav-links" id="navLinks"><a href="/">Inicio</a><a href="/directorio/">Directorio</a><a href="/tramites/">Trámites</a><a href="/contacto/">Contacto</a><a href="/academico/" class="active">Académico</a></div><div class="portal-user">Ana Martínez</div></div></nav>

    <main class="portal-shell container">
      <aside class="portal-sidebar academico-sidebar">
        <h2>Portal Académico</h2>
        <a class="portal-link" href="/academico/">Mi Panel</a>
        <a class="portal-link active" href="/academico/academico-2.html">Observatorio</a>
        <a class="portal-link" href="/academico/academico-3.html">Capacitación</a>
        <a class="portal-link" href="/academico/academico-4.html">Pasantías</a>
        <a class="portal-link" href="/academico/academico-5.html">Recursos</a>
      </aside>
      <section class="portal-content" id="observatorioContent">Cargando observatorio...</section>
    </main>

    <script src="/api-client.js"></script>
    <script>
      const menuToggle = document.getElementById('menuToggle');
      const navLinks = document.getElementById('navLinks');
      const observatorioContent = document.getElementById('observatorioContent');
      menuToggle?.addEventListener('click', () => navLinks?.classList.toggle('open'));

      function money(value) {
        return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(value || 0);
      }

      async function init() {
        try {
          const data = await API_CLIENT.portal.academico.observatorio();

          observatorioContent.innerHTML = `
          <div class="portal-breadcrumb">Portal Académico > Observatorio</div>
          <h1>Observatorio Cinematográfico</h1>

          <div class="academico-metrics">
            <article><strong>${money(data.metrics.inversion)}</strong><span>Inversión Total</span></article>
            <article><strong>${data.metrics.tramites}</strong><span>Trámites Directos</span></article>
            <article><strong>${data.metrics.equipos}</strong><span>Equipos Inscritos</span></article>
            <article><strong>${data.metrics.respuesta_promedio} días</strong><span>Tiempo Promedio Respuesta</span></article>
          </div>

          <div class="portal-grid-2">
            <section class="portal-card">
              <h3>Producciones por Tipo</h3>
              <div class="academico-bars">${(data.porTipo || []).map((item) => `<div><span>${item.tipo}</span><strong>${item.total}</strong></div>`).join('')}</div>
            </section>
            <section class="portal-card">
              <h3>Producciones por Provincia</h3>
              <div class="academico-bars">${(data.porProvincia || []).map((item) => `<div><span>${item.provincia}</span><strong>${item.total}</strong></div>`).join('')}</div>
            </section>
          </div>

          <section class="portal-card">
            <h3>Tendencia Mensual de Producciones</h3>
            <div class="academico-trend">${(data.tendencia || []).map((v) => `<div><i style="height:${Math.max(16, v * 2)}px"></i><span>${v}</span></div>`).join('')}</div>
          </section>

          <section class="portal-card">
            <h3>Documentación Legal y Técnica</h3>
            <div class="academico-list">${(data.documentos || []).map((doc) => `<div><strong>${doc.titulo}</strong><span>${doc.tipo}</span></div>`).join('')}</div>
          </section>
        `;
        } catch (error) {
          observatorioContent.innerHTML = `<article class="portal-card"><h1>No fue posible cargar el observatorio</h1><p>${error?.message || 'Intenta de nuevo más tarde.'}</p></article>`;
        }
      }

      init();
    </script>
    <script src='/nav-session.js'></script>
    <script src='/sidebar-slider.js'></script>
  </body>
</html>
