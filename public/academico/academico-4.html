<!--
  ACADEMICO-4.HTML — PORTAL ACADÉMICO: PASANTÍAS EN PROYECTOS

  RESPONSABILIDADES:
  1. Listar las convocatorias de pasantías activas en producciones cinematográficas
  2. Mostrar código, estado, ciudad, fechas de inicio y cierre de cada vacante
  3. Permitir al usuario aplicar a una pasantía abriendo un correo prellenado

  SECCIONES:
  - Listado de vacantes: Tarjetas con datos de la convocatoria y botones de acción
  - Aplicar ahora:       Abre el cliente de correo con asunto y cuerpo prellenados
  - Ver detalles:        Enlace reservado para futura implementación

  INTEGRACIÓN:
  - Consume API_CLIENT.portal.academico.pasantias() del cliente API compartido
  - La acción "Aplicar" construye un mailto con el código y nombre del proyecto
  - route-guard.js protege el acceso a la página por rol
  - nav-session.js y sidebar-slider.js gestionan sesión y sidebar en móvil
-->
<!doctype html>
<html lang="es">
  <head>
    <script src='/route-guard.js'></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PUFAB - Portal Académico | Pasantías</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="portal-page academico-page">
    <header class="gov-header"><div class="container gov-header-inner"><img src="https://www.figma.com/api/mcp/asset/55d910c5-1bcc-479c-acd9-c78a28860e9b" alt="GOV.CO" class="gov-logo" /><nav class="gov-links"><a href="https://www.gov.co/" target="_blank" rel="noreferrer">GOV.CO</a><a href="#">Ministerio de Cultura</a><a href="#">Proimágenes</a></nav></div><div class="flag-strip"></div></header>
    <nav class="site-nav"><div class="container site-nav-inner"><a href="/" class="brand"><span class="brand-icon">◧</span><span>PUFAB</span></a><button class="menu-toggle" aria-label="Abrir menú" id="menuToggle">☰</button><div class="nav-links" id="navLinks"><a href="/">Inicio</a><a href="/directorio/">Directorio</a><a href="/tramites/">Trámites</a><a href="/contacto/">Contacto</a><a href="/academico/" class="active">Académico</a></div><div class="portal-user">Ana Martínez</div></div></nav>

    <main class="portal-shell container">
      <aside class="portal-sidebar academico-sidebar">
        <h2>Portal Académico</h2>
        <a class="portal-link" href="/academico/">Mi Panel</a>
        <a class="portal-link" href="/academico/academico-2.html">Observatorio</a>
        <a class="portal-link" href="/academico/academico-3.html">Capacitación</a>
        <a class="portal-link active" href="/academico/academico-4.html">Pasantías</a>
        <a class="portal-link" href="/academico/academico-5.html">Recursos</a>
      </aside>

      <section class="portal-content">
        <div class="portal-breadcrumb">Portal Académico > Pasantías</div>
        <h1>Pasantías en Proyectos</h1>
        <div class="academico-list" id="pasantiasList">Cargando convocatorias...</div>
      </section>
    </main>

    <script src="/api-client.js"></script>
    <script>
      const menuToggle = document.getElementById('menuToggle');
      const navLinks = document.getElementById('navLinks');
      const pasantiasList = document.getElementById('pasantiasList');
      menuToggle?.addEventListener('click', () => navLinks?.classList.toggle('open'));

      function aplicarPasantia(item) {
        const body = encodeURIComponent(`Hola, quiero aplicar a la pasantía ${item.proyecto} (${item.codigo}).`);
        window.location.href = `mailto:info@boyacafilm.gov.co?subject=${encodeURIComponent(`Aplicación pasantía ${item.codigo}`)}&body=${body}`;
      }

      async function init() {
        try {
          const response = await API_CLIENT.portal.academico.pasantias();
          const data = response?.data || [];

          if (!data.length) {
            pasantiasList.innerHTML = '<article class="portal-card">No hay convocatorias activas.</article>';
            return;
          }

          pasantiasList.innerHTML = data.map((item) => `
          <article class="portal-card academico-vacante">
            <small>${item.codigo} · ${item.estado}</small>
            <h3>${item.proyecto}</h3>
            <p>${item.ciudad} · Inicio ${item.inicio}</p>
            <div class="permit-actions"><a href="#" data-aplicar-pasantia="${item.codigo}">Aplicar Ahora</a><a href="#">Ver Detalles</a></div>
            <div class="academico-deadline">Fecha límite de aplicación: ${item.cierre}</div>
          </article>
        `).join('');

          pasantiasList.querySelectorAll('[data-aplicar-pasantia]').forEach((button) => {
            button.addEventListener('click', (event) => {
              event.preventDefault();
              const vacante = data.find((entry) => entry.codigo === button.getAttribute('data-aplicar-pasantia'));
              if (vacante) aplicarPasantia(vacante);
            });
          });
        } catch (error) {
          pasantiasList.innerHTML = `<article class="portal-card">No fue posible cargar convocatorias. ${error?.message || ''}</article>`;
        }
      }

      init();
    </script>
    <script src='/nav-session.js'></script>
    <script src='/sidebar-slider.js'></script>
  </body>
</html>
