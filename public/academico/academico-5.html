<!doctype html>
<html lang="es">
  <head>
    <script src='/route-guard.js'></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PUFAB - Portal Académico | Recursos</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="portal-page academico-page">
    <header class="gov-header"><div class="container gov-header-inner"><img src="https://www.figma.com/api/mcp/asset/55d910c5-1bcc-479c-acd9-c78a28860e9b" alt="GOV.CO" class="gov-logo" /><nav class="gov-links"><a href="https://www.gov.co/" target="_blank" rel="noreferrer">GOV.CO</a><a href="#">Ministerio de Cultura</a><a href="#">Proimágenes</a></nav></div><div class="flag-strip"></div></header>
    <nav class="site-nav"><div class="container site-nav-inner"><a href="/" class="brand"><span class="brand-icon">◧</span><span>PUFAB</span></a><button class="menu-toggle" aria-label="Abrir menú" id="menuToggle">☰</button><div class="nav-links" id="navLinks"><a href="/">Inicio</a><a href="/directorio/">Directorio</a><a href="/tramites/">Trámites</a><a href="/contacto/">Contacto</a><a href="/academico/" class="active">Académico</a></div><div class="portal-user">Ana Martínez</div></div></nav>

    <main class="portal-shell container">
      <aside class="portal-sidebar academico-sidebar">
        <h2>Portal Académico</h2>
        <a class="portal-link" href="/academico/">Mi Panel</a>
        <a class="portal-link" href="/academico/academico-2.html">Observatorio</a>
        <a class="portal-link" href="/academico/academico-3.html">Capacitación</a>
        <a class="portal-link" href="/academico/academico-4.html">Pasantías</a>
        <a class="portal-link active" href="/academico/academico-5.html">Recursos</a>
      </aside>

      <section class="portal-content" id="recursosContent">Cargando recursos...</section>
    </main>

    <script src="/api-client.js"></script>
    <script>
      const menuToggle = document.getElementById('menuToggle');
      const navLinks = document.getElementById('navLinks');
      const recursosContent = document.getElementById('recursosContent');
      menuToggle?.addEventListener('click', () => navLinks?.classList.toggle('open'));

      async function init() {
        try {
          const data = await API_CLIENT.portal.academico.recursos();

          const cards = [
            { titulo: 'Documentos Legales', descripcion: data.documentos?.descripcion, total: data.documentos?.total, cta: 'Ver Documentos', href: '/academico/academico-2.html' },
            { titulo: 'Tutoriales en Video', descripcion: data.tutoriales?.descripcion, total: data.tutoriales?.total, cta: 'Ver Tutoriales', href: '/academico/academico-3.html' },
            { titulo: 'Estadísticas', descripcion: data.estadisticas?.descripcion, total: data.estadisticas?.total, cta: 'Ver Estadísticas', href: '/academico/academico-2.html' },
          ];

          recursosContent.innerHTML = `
          <div class="portal-breadcrumb">Portal Académico > Recursos</div>
          <h1>Recursos y Biblioteca</h1>
          <div class="academico-resource-grid">${cards.map((item) => `<article class="portal-card"><h3>${item.titulo}</h3><p>${item.descripcion}</p><small>${item.total} registros</small><a href="${item.href}">${item.cta}</a></article>`).join('')}</div>
        `;
        } catch (error) {
          recursosContent.innerHTML = `<article class="portal-card"><h1>No fue posible cargar los recursos</h1><p>${error?.message || 'Intenta de nuevo más tarde.'}</p></article>`;
        }
      }

      init();
    </script>
    <script src='/nav-session.js'></script>
    <script src='/sidebar-slider.js'></script>
  </body>
</html>
