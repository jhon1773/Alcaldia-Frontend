<!doctype html>
<html lang="es">
  <head>
    <script src='/route-guard.js'></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PUFAB - Portal Académico | Capacitación</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="portal-page academico-page">
    <header class="gov-header"><div class="container gov-header-inner"><img src="https://www.figma.com/api/mcp/asset/55d910c5-1bcc-479c-acd9-c78a28860e9b" alt="GOV.CO" class="gov-logo" /><nav class="gov-links"><a href="https://www.gov.co/" target="_blank" rel="noreferrer">GOV.CO</a><a href="#">Ministerio de Cultura</a><a href="#">Proimágenes</a></nav></div><div class="flag-strip"></div></header>
    <nav class="site-nav"><div class="container site-nav-inner"><a href="/" class="brand"><span class="brand-icon">◧</span><span>PUFAB</span></a><button class="menu-toggle" aria-label="Abrir menú" id="menuToggle">☰</button><div class="nav-links" id="navLinks"><a href="/">Inicio</a><a href="/directorio/">Directorio</a><a href="/tramites/">Trámites</a><a href="/contacto/">Contacto</a><a href="/academico/" class="active">Académico</a></div><div class="portal-user">Ana Martínez</div></div></nav>

    <main class="portal-shell container">
      <aside class="portal-sidebar academico-sidebar">
        <h2>Portal Académico</h2>
        <a class="portal-link" href="/academico/">Mi Panel</a>
        <a class="portal-link" href="/academico/academico-2.html">Observatorio</a>
        <a class="portal-link active" href="/academico/academico-3.html">Capacitación</a>
        <a class="portal-link" href="/academico/academico-4.html">Pasantías</a>
        <a class="portal-link" href="/academico/academico-5.html">Recursos</a>
      </aside>
      <section class="portal-content">
        <div class="portal-breadcrumb">Portal Académico > Capacitación</div>
        <h1>Capacitación y Tutoriales</h1>

        <div class="catalog-toolbar academico-toolbar">
          <input type="search" id="buscarCurso" placeholder="Buscar tutorial..." />
          <button class="btn btn-secondary" id="buscarBtn">Buscar</button>
        </div>

        <div class="academico-courses" id="cursosGrid">Cargando tutoriales...</div>
      </section>
    </main>

    <script src="/api-client.js"></script>
    <script>
      const menuToggle = document.getElementById('menuToggle');
      const navLinks = document.getElementById('navLinks');
      const buscarCurso = document.getElementById('buscarCurso');
      const buscarBtn = document.getElementById('buscarBtn');
      const cursosGrid = document.getElementById('cursosGrid');
      menuToggle?.addEventListener('click', () => navLinks?.classList.toggle('open'));

      function render(items) {
        if (!items.length) {
          cursosGrid.innerHTML = '<article class="portal-card">No hay tutoriales para este criterio.</article>';
          return;
        }

        cursosGrid.innerHTML = items.map((item) => `
          <article class="academico-course-card">
            <img src="${item.imagen}" alt="${item.titulo}" />
            <div>
              <small>${item.nivel} · ${item.duracion}</small>
              <h3>${item.titulo}</h3>
              <p>⭐ ${item.rating}</p>
            </div>
          </article>
        `).join('');
      }

      async function cargar() {
        try {
          const data = await API_CLIENT.portal.academico.capacitacion(buscarCurso.value.trim());
          render(data?.data || []);
        } catch (error) {
          cursosGrid.innerHTML = `<article class="portal-card">No fue posible cargar los tutoriales. ${error?.message || ''}</article>`;
        }
      }

      buscarCurso?.addEventListener('input', cargar);
      buscarBtn?.addEventListener('click', cargar);
      cargar();
    </script>
    <script src='/nav-session.js'></script>
    <script src='/sidebar-slider.js'></script>
  </body>
</html>
